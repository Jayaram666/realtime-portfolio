version: "3.8"

services:

  redis:
    image: redis:7
    container_name: realtime-redis
    ports:
      - "6379:6379"
    networks:
      - realtime-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: realtime-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - realtime-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: realtime-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: realtime-zookeeper:2181

      # 29092 is used by containers inside docker network.
      # 9092 is used by your local machine if needed.
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://realtime-kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - realtime-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: realtime-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - realtime-network

  service-discovery:
    build:
      context: ./service-discovery
      dockerfile: Dockerfile
    container_name: service-discovery
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
      SPRING_APPLICATION_NAME: service-discovery

      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
    networks:
      - realtime-network

  authentication-service:
    build:
      context: ./authentication-service
      dockerfile: Dockerfile
    container_name: authentication-service
    depends_on:
      - service-discovery
      - redis
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_APPLICATION_NAME: authentication-service

      # Local PostgreSQL from container
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: jayaram@9959

      SPRING_DATA_REDIS_HOST: realtime-redis
      SPRING_DATA_REDIS_PORT: 6379

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
    networks:
      - realtime-network

  stack-service:
    build:
      context: ./stack-service
      dockerfile: Dockerfile
    container_name: stack-service
    depends_on:
      - service-discovery
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_APPLICATION_NAME: stack-service

      # Local PostgreSQL from container
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/stock_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: jayaram@9959

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
    networks:
      - realtime-network

  portfolio-service:
    build:
      context: ./portfolio-service
      dockerfile: Dockerfile
    container_name: portfolio-service
    depends_on:
      - service-discovery
      - redis
      - kafka
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_APPLICATION_NAME: portfolio-service

      # Local PostgreSQL from container
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/portfolio_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: jayaram@9959

      SPRING_DATA_REDIS_HOST: realtime-redis
      SPRING_DATA_REDIS_PORT: 6379

      SPRING_KAFKA_BOOTSTRAP_SERVERS: realtime-kafka:29092

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
    networks:
      - realtime-network

  market-data-service:
    build:
      context: ./market-data-service
      dockerfile: Dockerfile
    container_name: market-data-service
    depends_on:
      - service-discovery
      - redis
      - kafka
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      SPRING_APPLICATION_NAME: market-data-service

      SPRING_DATA_REDIS_HOST: realtime-redis
      SPRING_DATA_REDIS_PORT: 6379

      SPRING_KAFKA_BOOTSTRAP_SERVERS: realtime-kafka:29092

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
    networks:
      - realtime-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    depends_on:
      - service-discovery
      - rabbitmq
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_APPLICATION_NAME: notification-service

      # Local PostgreSQL from container
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/notification_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: jayaram@9959

      SPRING_RABBITMQ_HOST: realtime-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
    networks:
      - realtime-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    depends_on:
      - service-discovery
      - authentication-service
      - stack-service
      - portfolio-service
      - market-data-service
      - notification-service
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_APPLICATION_NAME: api-gateway

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
    networks:
      - realtime-network

networks:
  realtime-network:
    driver: bridge