version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: realtime-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jayaram@9959
      POSTGRES_DB: auth_db
    # This command bypasses the need for an external script file entirely
    entrypoint: >
      bash -c "
      /usr/local/bin/docker-entrypoint.sh postgres &
      until pg_isready -q; do sleep 1; done;
      psql -U postgres -d auth_db -c 'CREATE DATABASE investor_db;' || true;
      psql -U postgres -d auth_db -c 'CREATE DATABASE portfolio_db;' || true;
      wait
      "
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realtime-network

  redis:
    image: redis:7-alpine
    container_name: realtime-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - realtime-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: realtime-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - realtime-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: realtime-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: realtime-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://realtime-kafka:29092,EXTERNAL://realtime-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server realtime-kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - realtime-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: realtime-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - realtime-network

  service-discovery:
    image: ${REGISTRY_USER}/service-discovery:latest
    container_name: service-discovery
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
      SPRING_APPLICATION_NAME: service-discovery
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
    networks:
      - realtime-network

  authentication-service:
    image: ${REGISTRY_USER}/authentication-service:latest
    container_name: authentication-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      service-discovery:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_APPLICATION_NAME: authentication-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: jayaram@9959
      SPRING_KAFKA_BOOTSTRAP_SERVERS: realtime-kafka:29092
      SPRING_DATA_REDIS_HOST: realtime-redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-my-super-secure-secret-key-with-32-chars-minimum}
      JWT_EXPIRATION_MS: 86400000
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: true
    networks:
      - realtime-network

  stack-service:
    image: ${REGISTRY_USER}/stack-service:latest
    container_name: stack-service
    depends_on:
      postgres:
        condition: service_healthy
      service-discovery:
        condition: service_started
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_APPLICATION_NAME: stack-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/investor_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: jayaram@9959
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
    networks:
      - realtime-network

  portfolio-service:
    image: ${REGISTRY_USER}/portfolio-service:latest
    container_name: portfolio-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      service-discovery:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_APPLICATION_NAME: portfolio-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/portfolio_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: jayaram@9959
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: realtime-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: realtime-kafka:29092
      SPRING_RABBITMQ_HOST: realtime-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
    networks:
      - realtime-network

  market-data-service:
    image: ${REGISTRY_USER}/market-data-service:latest
    container_name: market-data-service
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-discovery:
        condition: service_started
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      SPRING_APPLICATION_NAME: market-data-service
      SPRING_DATA_REDIS_HOST: realtime-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: realtime-kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
    networks:
      - realtime-network

  notification-service:
    image: ${REGISTRY_USER}/notification-service:latest
    container_name: notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      service-discovery:
        condition: service_started
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_APPLICATION_NAME: notification-service
      SPRING_RABBITMQ_HOST: realtime-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    networks:
      - realtime-network

  api-gateway:
    image: ${REGISTRY_USER}/api-gateway:latest
    container_name: api-gateway
    depends_on:
      - service-discovery
      - authentication-service
      - stack-service
      - portfolio-service
      - market-data-service
      - notification-service
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_APPLICATION_NAME: api-gateway
      JWT_SECRET: ${JWT_SECRET:-my-super-secure-secret-key-with-32-chars-minimum}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
    networks:
      - realtime-network

networks:
  realtime-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
