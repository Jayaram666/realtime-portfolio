server:
  port: 8060

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:api-gateway}
  main:
    allow-circular-references: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "174619078242-sp7nn6b1vioptjeov2fvfn4e2v59q8ts.apps.googleusercontent.com"
            client-secret: "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"
            scope:
              - openid
              - profile
              - email
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"
  cloud:
    gateway:
      # CRITICAL FIX: All routing rules, CORS definitions, and service locator configurations
      # must reside inside the webflux engine namespace block for modern versions.
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins: "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
            default-filters:
              - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          routes:
            - id: authentication-service
              uri: lb://authentication-service
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users/**

            - id: stock-service
              uri: lb://stock-service
              predicates:
                - Path=/api/stocks/**

            - id: portfolio-service
              uri: lb://portfolio-service
              predicates:
                - Path=/api/portfolio/**

            - id: market-data-service
              uri: lb://market-data-service
              predicates:
                - Path=/api/v1/stocks/**

            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**

jwt:
  secret: ${JWT_SECRET:my-super-secure-secret-key-with-32-chars-minimum}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway




logging:
  level:
    org:
      springframework:
        security: DEBUG
