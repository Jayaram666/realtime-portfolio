spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/investor_db
    username: postgres
    password: jayaram@9959

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: 8080
kind: Application

jwt:
  secret: "this-is-my-super-secure-jwt-secret-key-2026-for-investor-app"
  expiration-ms: 3600000

top-stocks:  RELIANCE.NS,TCS.NS,INFY.NS,HDFCBANK.NS,ICICIBANK.NS,SBIN.NS,ITC.NS

resilience4j:
  retry:
    instances:
      yahooFinanceRetry:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - com.portfolio.exception.YahooFinanceClientException
        ignore-exceptions:
          - java.lang.IllegalArgumentException

  circuitbreaker:
    instances:
      yahooFinanceCircuitBreaker:
        failure-rate-threshold: 50
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s