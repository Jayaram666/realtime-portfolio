server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:stack-service}
  flyway:
    # Enables Flyway database migrations on application startup
    enabled: true
    # Tells Flyway to look in the standard classpath folder for SQL scripts
    locations: classpath:db/migration
    # Creates the history metadata table if the database already contains a schema
    baseline-on-migrate: true
    # Sets the version identifier for the initial baseline schema creation
    baseline-version: 1
    # Stops application boot instantly if migration syntax or validation checks fail
    fail-on-missing-locations: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stock_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info